<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>You're Website is Online :)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding-top: 50px;
            color: #2c3e50;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .button-container {

        }
        .btn-weiter {

            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-weiter:hover {
            background-color: #2980b9;
        }

<body>
    <h1>Server is running...</h1> 🎉</h1>

    <div class="button-container">
